# Nginx edge reverse-proxy config for production.
# Place TLS certificates at the paths below (e.g. via Certbot / Let's Encrypt):
#   /etc/nginx/ssl/fullchain.pem
#   /etc/nginx/ssl/privkey.pem
#
# Obtain certificates with:
#   certbot certonly --standalone -d your-domain.com
#   ln -s /etc/letsencrypt/live/your-domain.com/fullchain.pem /etc/nginx/ssl/fullchain.pem
#   ln -s /etc/letsencrypt/live/your-domain.com/privkey.pem  /etc/nginx/ssl/privkey.pem
#
# For staging / self-signed, generate with:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/privkey.pem \
#     -out    /etc/nginx/ssl/fullchain.pem \
#     -subj "/CN=localhost"

upstream systolab_api {
    server api:4100;
    keepalive 32;
}

upstream systolab_web {
    server web:80;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;           # Replace with your real domain in production.

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern TLS settings (TLS 1.2+ only, strong ciphers).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 2m;

    # ── API routes ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://systolab_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # Public API (v1 versioned routes)
    location /v1/ {
        proxy_pass http://systolab_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # Health check (no auth, monitored by load balancer)
    location = /health {
        proxy_pass http://systolab_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Static frontend (SPA) ──────────────────────────────────────────────────
    location / {
        proxy_pass http://systolab_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
