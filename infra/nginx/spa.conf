# Nginx config for the web container (SPA static file server).
# This is NOT the edge/reverse-proxy config; see default.conf for that.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — send all unknown paths to index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; Vite adds content hashes to filenames.
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|svg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — it must always be fresh.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;
}
