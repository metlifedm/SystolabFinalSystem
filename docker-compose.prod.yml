# Production Docker Compose — full stack with TLS-terminating Nginx.
#
# Prerequisites:
#   1. Copy .env.example → .env.prod and fill every variable.
#   2. Place TLS certs at ./infra/nginx/ssl/fullchain.pem and privkey.pem
#      (or mount a Certbot volume — see comments below).
#   3. Run: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Rollback:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod \
#     up -d --no-build --pull never \
#     api=ghcr.io/your-org/systolab-api:PREVIOUS_TAG
#   (or pin image tags below and re-deploy)

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: always
    command: ["mongod", "--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: systolab
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - backend
    # Do NOT expose port 27017 on the host in production.
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    image: ${API_IMAGE:-systolab-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: "4100"
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/systolab?authSource=admin
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      SYSTOLAB_ENV: ${SYSTOLAB_ENV:-production}
      SYSTOLAB_REGION: ${SYSTOLAB_REGION:-us-east-1}
      SYSTOLAB_NODE_CLUSTER: ${SYSTOLAB_NODE_CLUSTER:-prod-1}
      SYSTOLAB_BUILD_HASH: ${SYSTOLAB_BUILD_HASH:-unknown}
      SYSTOLAB_AUTH_JWT_SECRET: ${SYSTOLAB_AUTH_JWT_SECRET}
      SYSTOLAB_ADMIN_JWT_SECRET: ${SYSTOLAB_ADMIN_JWT_SECRET}
      SYSTOLAB_INTERNAL_ADMIN_KEY: ${SYSTOLAB_INTERNAL_ADMIN_KEY}
      SYSTOLAB_OWNER_ADMIN_KEY: ${SYSTOLAB_OWNER_ADMIN_KEY}
      SYSTOLAB_MANAGER_ADMIN_KEY: ${SYSTOLAB_MANAGER_ADMIN_KEY}
      SYSTOLAB_GOOGLE_CLIENT_ID: ${SYSTOLAB_GOOGLE_CLIENT_ID}
      SYSTOLAB_GOOGLE_JWKS_JSON: ${SYSTOLAB_GOOGLE_JWKS_JSON}
      SYSTOLAB_AUTH_ALLOW_DEV_GOOGLE_CREDENTIAL: "false"
      SYSTOLAB_ARTIFACT_SECRET: ${SYSTOLAB_ARTIFACT_SECRET}
      SYSTOLAB_ARTIFACT_DIR: /data/artifacts
      SYSTOLAB_BACKUP_DIR: /data/backups
      SYSTOLAB_BACKUP_MAX_AGE_DAYS: ${SYSTOLAB_BACKUP_MAX_AGE_DAYS:-7}
      SYSTOLAB_BACKUP_MONGODUMP_PATH: mongodump
      SYSTOLAB_BACKUP_MONGORESTORE_PATH: mongorestore
      SYSTOLAB_PLAYWRIGHT_ENABLED: ${SYSTOLAB_PLAYWRIGHT_ENABLED:-false}
      SYSTOLAB_SCAN_WORKER_ENABLED: "true"
      SYSTOLAB_SCAN_WORKER_BATCH_SIZE: ${SYSTOLAB_SCAN_WORKER_BATCH_SIZE:-2}
      SYSTOLAB_MONITORING_WORKER_ENABLED: "true"
      SYSTOLAB_IIRE_WORKER_ENABLED: "true"
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
    volumes:
      - artifact_data:/data/artifacts
      - backup_data:/data/backups
    networks:
      - backend
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Web (SPA) ─────────────────────────────────────────────────────────────────
  web:
    image: ${WEB_IMAGE:-systolab-web:latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    restart: always
    networks:
      - backend

  # ── Nginx (TLS edge) ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      # Uncomment to use Certbot webroot renewals:
      # - certbot_webroot:/var/www/certbot:ro
    networks:
      - backend
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

networks:
  backend:
    driver: bridge

volumes:
  mongo_data:
  mongo_config:
  artifact_data:
  backup_data:
  # certbot_webroot:
